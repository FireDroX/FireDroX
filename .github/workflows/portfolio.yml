name: Generate Portfolio Pin
on:
  schedule:
    - cron: "55 17 * * *"
  workflow_dispatch:
jobs:
  build:
    name: Jobs to update portfolio pin
    runs-on: ubuntu-latest
    steps:
      - name: Generate pin card dark
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=FireDroX&repo=dynamic-portfolio&theme=dark&hide_border=true
          path: dist/pin-portfolio-dark.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Generate pin card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=FireDroX&repo=dynamic-portfolio&theme=graywhite&hide_border=true
          path: dist/pin-portfolio.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - uses: crazy-max/ghaction-github-pages@v2.1.3
        with:
          target_branch: pined
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
